name: Build And Publish

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11.9'

permissions:
  contents: write
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-tag-release:
    name: Create Tag And Release
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create unique tag
        id: tag
        run: |
          TAG_NAME="v$(date -u +'%Y.%m.%d')-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG_NAME"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG_NAME" "$GITHUB_SHA" -m "Automated release for $GITHUB_SHA"
            git push origin "refs/tags/$TAG_NAME"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag_name }}"
          if gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release already exists: $TAG_NAME"
          else
            gh release create "$TAG_NAME" \
              --repo "$GH_REPO" \
              --target "$GITHUB_SHA" \
              --title "$TAG_NAME" \
              --generate-notes
          fi

  docker:
    name: Docker (GHCR)
    runs-on: ubuntu-latest
    needs: [create-tag-release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/genesys-cloud-reporting
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=raw,value=${{ needs.create-tag-release.outputs.tag_name }}

      - name: Build and (optionally) push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  linux-bin:
    name: Linux Binary Artifact
    runs-on: ubuntu-latest
    needs: [create-tag-release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Verify Python version
        run: |
          python -c "import sys; print(sys.version)"
          python -c "import sys; raise SystemExit(0 if sys.version_info[:2] == (3, 11) else 1)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --only-binary=:all: -r requirements.txt
          pip check
          pip install "pyinstaller>=6.3.0"

      - name: Validate Python syntax (Linux)
        run: |
          python -m compileall -q app.py run_app.py src

      - name: Build Linux binary with PyInstaller
        run: |
          pyinstaller --clean --noconfirm --onefile --name "GenesysReporting-linux" \
            --collect-all streamlit \
            --collect-all streamlit_autorefresh \
            --collect-all streamlit_cookies_manager \
            --collect-all cryptography \
            --collect-all pyarrow \
            --collect-all reportlab \
            --collect-all psutil \
            --hidden-import websocket \
            --hidden-import websocket._exceptions \
            --hidden-import psutil \
            --add-data "app.py:." \
            --add-data "METRICS_REFERENCE.md:." \
            --add-data "USER_GUIDE.md:." \
            --add-data ".streamlit:.streamlit" \
            --add-data "src:src" \
            run_app.py

      - name: Smoke test Linux binary
        run: |
          set -euo pipefail
          chmod +x dist/GenesysReporting-linux
          ./dist/GenesysReporting-linux > smoke-linux.log 2>&1 &
          APP_PID=$!
          cleanup() {
            kill "$APP_PID" >/dev/null 2>&1 || true
            wait "$APP_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for i in $(seq 1 90); do
            if curl --silent --fail "http://127.0.0.1:8501/_stcore/health" >/dev/null; then
              echo "Linux binary smoke test passed."
              exit 0
            fi
            sleep 1
          done
          echo "Linux binary smoke test failed. Last logs:"
          tail -n 200 smoke-linux.log || true
          exit 1

      - name: Stamp Linux artifact metadata
        run: |
          cat > dist/build-info-linux.txt <<EOF
          sha=${GITHUB_SHA}
          ref=${GITHUB_REF}
          tag=${{ needs.create-tag-release.outputs.tag_name }}
          run_id=${GITHUB_RUN_ID}
          python_version=${{ env.PYTHON_VERSION }}
          built_at_utc=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: GenesysReporting-linux-bin
          path: |
            dist/GenesysReporting-linux
            dist/build-info-linux.txt

  windows-exe:
    name: Windows EXE Artifact
    runs-on: windows-latest
    needs: [create-tag-release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Verify Python version
        run: |
          python -c "import sys; print(sys.version)"
          python -c "import sys; raise SystemExit(0 if sys.version_info[:2] == (3, 11) else 1)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --only-binary=:all: -r requirements.txt
          pip check
          pip install "pyinstaller>=6.3.0"

      - name: Validate Python syntax (Windows)
        run: |
          python -m compileall -q app.py run_app.py src

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm --onefile --noconsole --name "GenesysReporting" `
            --runtime-tmpdir "." `
            --collect-all streamlit `
            --collect-all streamlit_autorefresh `
            --collect-all streamlit_cookies_manager `
            --collect-all cryptography `
            --collect-all pyarrow `
            --collect-all reportlab `
            --collect-all psutil `
            --hidden-import websocket `
            --hidden-import websocket._exceptions `
            --hidden-import psutil `
            --add-data "app.py;." `
            --add-data "METRICS_REFERENCE.md;." `
            --add-data "USER_GUIDE.md;." `
            --add-data ".streamlit;.streamlit" `
            --add-data "src;src" `
            run_app.py

      - name: Smoke test Windows EXE
        shell: pwsh
        env:
          GENESYS_WINDOWS_SERVICE_AUTO_INSTALL: "0"
        run: |
          $ErrorActionPreference = "Stop"
          $stdoutPath = Join-Path $PWD "smoke-windows.out.log"
          $stderrPath = Join-Path $PWD "smoke-windows.err.log"
          if (Test-Path $stdoutPath) { Remove-Item $stdoutPath -Force }
          if (Test-Path $stderrPath) { Remove-Item $stderrPath -Force }

          $proc = Start-Process -FilePath "dist/GenesysReporting.exe" `
            -PassThru `
            -RedirectStandardOutput $stdoutPath `
            -RedirectStandardError $stderrPath

          try {
            $healthy = $false
            for ($i = 0; $i -lt 90; $i++) {
              try {
                $resp = Invoke-WebRequest -Uri "http://127.0.0.1:8501/_stcore/health" -UseBasicParsing -TimeoutSec 2
                if ($resp.StatusCode -eq 200) {
                  $healthy = $true
                  break
                }
              } catch {}
              Start-Sleep -Seconds 1
            }

            if (-not $healthy) {
              Write-Host "Windows EXE smoke test failed. Last logs:"
              if (Test-Path $stdoutPath) { Get-Content $stdoutPath -Tail 200 }
              if (Test-Path $stderrPath) { Get-Content $stderrPath -Tail 200 }
              throw "Windows EXE health endpoint not reachable."
            }

            Write-Host "Windows EXE smoke test passed."
          }
          finally {
            if ($proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Stamp EXE with build metadata
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}"
          $tag = "${{ needs.create-tag-release.outputs.tag_name }}"
          @"
          sha=$sha
          ref=${{ github.ref }}
          tag=$tag
          run_id=${{ github.run_id }}
          python_version=${{ env.PYTHON_VERSION }}
          built_at_utc=$(Get-Date -AsUTC -Format o)
          "@ | Out-File -FilePath "dist/build-info-windows.txt" -Encoding utf8

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GenesysReporting-windows-exe
          path: |
            dist/GenesysReporting.exe
            dist/build-info-windows.txt

  release-assets:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [create-tag-release, linux-bin, windows-exe]
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: GenesysReporting-*
          path: release
          merge-multiple: true

      - name: List downloaded files
        run: ls -lah release

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG_NAME="${{ needs.create-tag-release.outputs.tag_name }}"
          gh release upload "$TAG_NAME" \
            --repo "$GH_REPO" \
            release/GenesysReporting-linux \
            release/GenesysReporting.exe \
            release/build-info-linux.txt \
            release/build-info-windows.txt \
            --clobber

      - name: Verify release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG_NAME="${{ needs.create-tag-release.outputs.tag_name }}"
          gh release view "$TAG_NAME" --repo "$GH_REPO" --json assets

      - name: Publish build summary
        run: |
          echo "Tag: ${{ needs.create-tag-release.outputs.tag_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Python: ${{ env.PYTHON_VERSION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Release assets uploaded successfully." >> "$GITHUB_STEP_SUMMARY"
